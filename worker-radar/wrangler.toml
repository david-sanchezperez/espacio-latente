name = "espacio-latente-radar"
main = "src/index.js"
compatibility_date = "2026-07-14"

# Cron dos veces al día. Cloudflare solo admite UTC: 07:00/19:00 UTC
# equivalen a las 08:00/20:00 CET en invierno y 09:00/21:00 CEST en
# verano (una hora de deriva estacional, asumida — ver diseño en el chat).
[triggers]
crons = ["0 7 * * *", "0 19 * * *"]

[[kv_namespaces]]
binding = "RADAR_KV"
id = "8f48f4a99284495b9999fd85390a9ddc"

# Contabilidad de llamadas LLM (fase 1 de v0.2 — ver DEVLOG.md). Creación:
#   npx wrangler d1 create radar-costes   (una vez; copia el database_id de abajo)
#   npx wrangler d1 execute radar-costes --file=schema.sql --remote
[[d1_databases]]
binding = "RADAR_DB"
database_name = "radar-costes"
database_id = "34c06153-9fe2-4f07-acb8-bafb0889749f"

[ai]
binding = "AI"

# Migración a Queues (ver DEVLOG.md): el cron y /ejecutar ya no procesan
# todas las fuentes de una pasada en una sola invocación (eso agotaba el
# límite de 50 subrequests externos, confirmado en producción con 59). En
# vez de eso encolan un mensaje por lote de fuentes; cada mensaje se
# procesa en su propia invocación, con su propio presupuesto de 50.
[[queues.producers]]
queue = "radar-fuentes"
binding = "RADAR_QUEUE"

[[queues.consumers]]
queue = "radar-fuentes"
max_batch_size = 1
max_concurrency = 1
max_retries = 3

[[routes]]
pattern = "radar.espacio-latente.com"
custom_domain = true
